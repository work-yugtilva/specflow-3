project_id = "vphlxjlvwgomvydovxnb"

# SQL-first migrations only — no Alembic, no ORM codegen
# Run: supabase db push (remote) or supabase db reset (local)
# Migration files: supabase/migrations/YYYYMMDDHHMMSS_<name>.sql

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false

[api]
port = 54321
schemas = ["public", "extensions"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://specflow.app"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.hook.custom_access_token]
enabled = true
uri = "pg-functions://postgres/public/custom_access_token"
