name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Context 1: ruff + mypy strict
  lint-python:
    name: ruff+mypy-strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check specflow/
      - run: mypy specflow/ --strict --ignore-missing-imports

  # Context 2: pytest unit + integration
  test-unit:
    name: pytest unit+integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest tests/unit tests/integration -v --tb=short

  # Context 3: pytest api
  test-api:
    name: pytest api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest tests/api -v --tb=short

  # Context 4: tsc + eslint + next-build
  build-web:
    name: tsc+eslint+next-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run typecheck
        working-directory: web
      - run: npm run lint
        working-directory: web
      - run: npm run build
        working-directory: web

  # Context 5: playwright-smoke (TODO-§21 placeholder — trivially passes)
  playwright-smoke:
    name: playwright-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "TODO-§21 placeholder — Playwright wired in Section 21"

  # Context 6: eval-gate (TODO-§19 placeholder — trivially passes)
  eval-gate:
    name: eval-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "TODO-§19 placeholder — eval gate wired in Section 19"

  # Context 7: migration-check
  migration-check:
    name: migration-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check migration files are not empty
        run: |
          files=$(find supabase/migrations -name "*.sql" 2>/dev/null)
          if [ -z "$files" ]; then
            echo "No migrations yet — pass"
          else
            for f in $files; do
              if [ ! -s "$f" ]; then echo "Empty migration: $f" && exit 1; fi
            done
            echo "All migrations non-empty"
          fi
